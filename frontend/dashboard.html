<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mahasiswa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dashboard Mahasiswa</h1>
        <button onclick="logout()" class="btn-danger">Logout</button>
    </div>

    <div class="grid-layout">
        <div class="card section-card">
            <h2>Tambah Catatan</h2>
            <div class="form-group">
                <input type="text" id="title" placeholder="Judul Catatan">
            </div>
            <div class="form-group">
                <textarea id="content" placeholder="Isi Catatan" rows="4"></textarea>
            </div>
            <button onclick="addNote()" class="btn-primary">Tambah Catatan</button>
            
            <div id="notes" class="list-container"></div>
        </div>

        <div class="card section-card">
            <h2>Tambah Jadwal Kuliah</h2>
            <div class="form-group">
                <input type="text" id="course" placeholder="Mata Kuliah">
            </div>
            <div class="grid-2-cols">
                <div class="form-group">
                    <input type="text" id="day" placeholder="Hari">
                </div>
                <div class="form-group">
                    <input type="time" id="time" placeholder="Jam">
                </div>
            </div>
            <div class="form-group">
                <input type="text" id="room" placeholder="Ruangan">
            </div>
            <button onclick="addSchedule()" class="btn-primary">Tambah Jadwal</button>

            <div id="schedules" class="list-container"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        checkAuth();
        loadNotes();
        loadSchedules();
    });
</script>
</body>
</html>
