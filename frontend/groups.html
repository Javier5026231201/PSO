<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Matkul - Portal ITS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .group-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .group-card {
            border-top: 5px solid var(--its-gold);
            transition: transform 0.2s;
        }

        .group-card:hover {
            transform: translateY(-5px);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .badge-count {
            background: var(--its-blue);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .empty-state {
            color: #a0aec0;
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
        }

        .note-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid var(--its-green);
        }

        .note-item h4 {
            margin: 0 0 5px 0;
            font-size: 0.95rem;
            color: var(--its-blue);
        }

        .note-item small {
            color: #718096;
            display: block;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>PORTAL ITS</h2>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="add-note.html" class="nav-link">Tambah Notes</a>
        <a href="add-schedule.html" class="nav-link">Tambah Jadwal</a>
        <a href="groups.html" class="nav-link active">Grup Matkul</a>
        <a href="#" onclick="logout()" class="nav-link" style="margin-top: 50px; color: var(--its-gold);">Logout</a>
    </div>

    <div class="main-content">
        <header class="header">
            <div>
                <h1>Grouping Mata Kuliah</h1>
                <p>Semua catatan Anda dikelompokkan secara otomatis berdasarkan kategori.</p>
            </div>
        </header>

        <div class="group-container" id="groups-wrapper">
            <div class="card group-card">
                <div class="group-header">
                    <h3>PSO</h3>
                    <span class="badge-count" id="count-PSO">0</span>
                </div>
                <div id="group-PSO" class="group-content">
                    <p class="empty-state">Memuat data...</p>
                </div>
            </div>

            <div class="card group-card">
                <div class="group-header">
                    <h3>Progjar</h3>
                    <span class="badge-count" id="count-Progjar">0</span>
                </div>
                <div id="group-Progjar" class="group-content">
                    <p class="empty-state">Memuat data...</p>
                </div>
            </div>

            <div class="card group-card">
                <div class="group-header">
                    <h3>Database</h3>
                    <span class="badge-count" id="count-Database">0</span>
                </div>
                <div id="group-Database" class="group-content">
                    <p class="empty-state">Memuat data...</p>
                </div>
            </div>

            <div class="card group-card" style="border-top-color: #cbd5e0;">
                <div class="group-header">
                    <h3>Umum / Lainnya</h3>
                    <span class="badge-count" id="count-Umum">0</span>
                </div>
                <div id="group-Umum" class="group-content">
                    <p class="empty-state">Memuat data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                window.location.href = 'index.html';
                return;
            }
            loadGroupedNotes(userId);
        });

        async function loadGroupedNotes(userId) {
            try {
                const response = await fetch(`${API}/notes?user_id=${userId}`);
                const notes = await response.json();

                // Daftar kategori yang tersedia
                const categories = ['PSO', 'Progjar', 'Database', 'Umum'];
                
                categories.forEach(cat => {
                    const filteredNotes = notes.filter(n => n.category === cat);
                    const container = document.getElementById(`group-${cat}`);
                    const badge = document.getElementById(`count-${cat}`);
                    
                    badge.innerText = filteredNotes.length;

                    if (filteredNotes.length > 0) {
                        container.innerHTML = filteredNotes.map(n => `
                            <div class="note-item">
                                <h4>${n.title}</h4>
                                <small>📅 ${new Date(n.date).toLocaleDateString('id-ID')} | 🕒 ${new Date(n.date).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</small>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = `<p class="empty-state">Belum ada catatan di grup ini.</p>`;
                    }
                });
            } catch (error) {
                console.error("Gagal memuat grup:", error);
            }
        }
    </script>
</body>
</html>
